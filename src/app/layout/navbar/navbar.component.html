<header class="navbar">

  <div class="navbar-left">
    <button class="icon-btn menu-toggle" (click)="onMenuToggle()" aria-label="Toggle menu">
      <span class="material-icons">menu</span>
    </button>
    <div class="search-box">
      <span class="material-icons search-icon">search</span>
      <input type="text" placeholder="Search here..." class="search-input" />
    </div>
  </div>

  <div class="navbar-right">
    <button class="icon-btn theme-toggle" (click)="themeSvc.toggle()" [title]="themeSvc.isDark() ? 'Modo claro' : 'Modo oscuro'" aria-label="Toggle theme">
      <span class="material-icons">{{ themeSvc.isDark() ? 'light_mode' : 'dark_mode' }}</span>
    </button>
  </div>

</header>
